<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Paper Maker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div id="paperHeader">
        <h2>SCHOOL / INSTITUTE NAME</h2>
        <p>Annual Examination 2026</p>

        <div class="row">
            <span>Subject: ____________</span>
            <span>Time: 2 Hours</span>
        </div>

        <div class="row">
            <span>Total Marks: 50</span>
            <span>Date: ____________</span>
        </div>

        <p>Name: ____________ &nbsp;&nbsp;&nbsp; Roll No: ____________</p>
    </div>

    <!-- BUTTONS -->
    <div class="buttons">
        <button onclick="addMCQ()">Add MCQ (Q1)</button>
        <button onclick="addQuestion()">Add Question</button>
        <button onclick="downloadPDF()">Download PDF</button>
    </div>

    <!-- PAPER OUTPUT -->
    <div id="paperArea"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="script.js"></script>

</body>
</html>
